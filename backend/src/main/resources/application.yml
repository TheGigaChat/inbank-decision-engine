spring:
  application:
    name: decision-engine
  datasource:
    url: jdbc:h2:mem:decisiondb
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
  jpa:
    hibernate:
      ddl-auto: none
  sql:
    init:
      mode: always

loan:
  constraints:
    min-amount: 2000
    max-amount: 10000
    min-period: 12
    max-period: 60