version: "3.9"

services:
  backend:
    build:
      context: ./backend
    container_name: inbank-backend
    ports:
      - "8080:8080"

  frontend:
    build:
      context: ./frontend
    container_name: inbank-frontend
    ports:
      - "3000:3000"
    environment:
      API_BASE_URL: http://backend:8080
    depends_on:
      - backend
